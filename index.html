<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFest</title>
    <link rel="icon" type="image/png" href="elements/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'WDXL Lubrifont JP N';
            src: url('fonts/WDXLLubrifontJPNVNM-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #111619;
            color: #b3a272;
            font-family: 'WDXL Lubrifont JP N', monospace;
            min-height: 100vh;
            overflow: hidden;
        }

        .landing-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('elements/main-landing.png') no-repeat center center;
            background-size: cover;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 40px;
        }

        .buttons {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .landing-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 180px;
            border: 1px solid rgba(179, 162, 114, 0.3);
            background: rgba(17, 22, 25, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.3s, background 0.3s, transform 0.15s;
        }

        .landing-btn:hover {
            border-color: rgba(179, 162, 114, 0.7);
            background: rgba(17, 22, 25, 0.8);
            transform: scale(1.03);
        }

        .landing-btn img {
            max-width: 120px;
            height: auto;
            opacity: 0.85;
            transition: opacity 0.3s;
        }

        .landing-btn:hover img {
            opacity: 1;
        }

        .landing-btn.blank {
            cursor: default;
            opacity: 0.3;
        }

        .landing-btn.blank:hover {
            border-color: rgba(179, 162, 114, 0.3);
            background: rgba(17, 22, 25, 0.6);
            transform: none;
        }

        .blank-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.4;
            color: #b3a272;
        }

        @media (max-width: 480px) {
            .landing-btn {
                width: 140px;
                height: 140px;
            }
            .landing-btn img {
                max-width: 90px;
            }
            .buttons {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-bg"></div>
    <div class="content">
        <div class="buttons">
            <a href="https://twysted.afest.io" class="landing-btn">
                <img src="elements/TDen_logo_plaingold.png" alt="Twisted Duality">
            </a>
            <a href="https://afest.io/owyler" class="landing-btn">
                <img src="elements/button-gold-owyler.png" alt="Owyler">
            </a>
        </div>
    </div>
</body>
</html>
