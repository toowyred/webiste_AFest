<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owyler — AFest</title>
    <link rel="icon" type="image/png" href="../elements/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'WDXL Lubrifont JP N';
            src: url('../fonts/WDXLLubrifontJPNVNM-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg: #111619;
            --gold: #b3a272;
            --gold-dim: rgba(179, 162, 114, 0.3);
            --gold-mid: rgba(179, 162, 114, 0.5);
            --gold-bright: rgba(179, 162, 114, 0.8);
            --teal: #2a7a6e;
            --glass: rgba(17, 22, 25, 0.6);
            --glass-border: rgba(179, 162, 114, 0.15);
        }

        body {
            background-color: var(--bg);
            color: var(--gold);
            font-family: 'WDXL Lubrifont JP N', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── STILL GLITCH ─── */
        .still-glitch {
            position: relative;
            display: inline-block;
        }

        .still-glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            color: #f2f3f4;
            overflow: hidden;
            animation: still-glitch-anim 4s infinite;
            clip-path: inset(0 100% 0 0);
        }

        @keyframes still-glitch-anim {
            0%, 85% { clip-path: inset(0 100% 0 0); }
            86% { clip-path: inset(0 0 0 0); }
            88% { clip-path: inset(0 100% 0 0); }
            90% { clip-path: inset(0 0 0 0); }
            94% { clip-path: inset(0 0 0 0); }
            95% { clip-path: inset(0 100% 0 0); }
            97% { clip-path: inset(0 0 0 0); }
            100% { clip-path: inset(0 100% 0 0); }
        }

        /* ─── HEADER ─── */
        .header {
            padding: 40px 20px 30px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .header img {
            max-width: 160px;
            opacity: 0.85;
            margin-bottom: 12px;
        }

        .header-sub {
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.4;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .back-link:hover { opacity: 0.9; }

        /* ─── ALBUM FILTER ─── */
        .album-filter {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 24px 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            font-family: 'WDXL Lubrifont JP N', monospace;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gold);
            color: var(--bg);
            border-color: var(--gold);
        }

        /* ─── GALLERY GRID ─── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 3px;
            padding: 3px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 3 / 2;
            overflow: hidden;
            cursor: pointer;
            background: rgba(179, 162, 114, 0.05);
        }

        .gallery-item img.thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.5s ease;
            filter: saturate(0.3) contrast(1.1);
        }

        .gallery-item:hover img.thumb {
            transform: scale(1.05);
            filter: saturate(0.6) contrast(1.05) brightness(0.4);
        }

        /* ─── ALBUM HOVER OVERLAY ─── */
        .album-hover {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 2;
        }

        .gallery-item:hover .album-hover {
            opacity: 1;
        }

        .album-hover img {
            max-width: 65%;
            max-height: 50%;
            object-fit: contain;
        }

        .album-hover .album-name {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 12px;
        }

        .album-hover .album-venue {
            font-size: 0.5rem;
            letter-spacing: 2px;
            color: var(--gold);
            opacity: 0.5;
            margin-top: 4px;
        }

        /* ─── SINGLE PHOTO OVERLAY (inside albums) ─── */
        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 14px;
            background: linear-gradient(transparent, rgba(17, 22, 25, 0.85));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay-title {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .overlay-meta {
            font-size: 0.5rem;
            letter-spacing: 1.5px;
            opacity: 0.5;
            margin-top: 3px;
        }

        /* ─── PLACEHOLDER CARDS (no photos yet) ─── */
        .placeholder-card {
            aspect-ratio: 3 / 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .placeholder-icon {
            font-size: 1.5rem;
            opacity: 0.15;
            margin-bottom: 8px;
        }

        .placeholder-text {
            font-size: 0.55rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.2;
        }

        /* ─── LIGHTBOX ─── */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(17, 22, 25, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border: 1px solid var(--glass-border);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 24px;
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .lightbox-close:hover { opacity: 1; }

        .lightbox-caption {
            position: absolute;
            bottom: 24px;
            text-align: center;
            width: 100%;
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        /* ─── FOOTER ─── */
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--glass-border);
            margin-top: 40px;
        }

        .footer p {
            font-size: 0.55rem;
            letter-spacing: 2px;
            opacity: 0.3;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 2px;
                padding: 2px;
            }
            .header { padding: 30px 16px 20px; }
            .header img { max-width: 120px; }
            .filter-btn { font-size: 0.5rem; padding: 5px 10px; }
        }

        @media (max-width: 360px) {
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <a href="https://afest.io" class="back-link">&larr; afest.io</a>

    <div class="header">
        <img src="../elements/button-gold-owyler.png" alt="Owyler">
        <div class="header-sub">Currently <span class="still-glitch" data-text="moving stuff around">recombobulating...</span> come back later</div>
    </div>

    <!-- Album filter tabs -->
    <div class="album-filter">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="album-24mld">MelloDeath 2024</button>
    </div>

    <!-- Gallery grid -->
    <div class="gallery">

        <!-- MelloDeath 2024 -->
        <a href="#" class="gallery-item" data-album="album-24mld">
            <img class="thumb" src="../elements/placeholder/album-24mld-img1.jpg" alt="MelloDeath 2024">
            <div class="album-hover">
                <img src="../elements/placeholder/album-24mld-hover.png" alt="">
                <div class="album-name">MelloDeath 2024</div>
                <div class="album-venue">Armory / Minneapolis, MN</div>
            </div>
        </a>

        <!-- Future albums -->
        <div class="placeholder-card"><div class="placeholder-icon">&#9670;</div><div class="placeholder-text">awaiting transmission</div></div>
        <div class="placeholder-card"><div class="placeholder-icon">&#9670;</div><div class="placeholder-text">awaiting transmission</div></div>
        <div class="placeholder-card"><div class="placeholder-icon">&#9670;</div><div class="placeholder-text">awaiting transmission</div></div>
        <div class="placeholder-card"><div class="placeholder-icon">&#9670;</div><div class="placeholder-text">awaiting transmission</div></div>
        <div class="placeholder-card"><div class="placeholder-icon">&#9670;</div><div class="placeholder-text">awaiting transmission</div></div>

        <div class="gallery-item" data-album="album-1" onclick="openLightbox(this)">
            <img src="https://res.cloudinary.com/yourname/w_800,q_auto,f_auto/photo1.jpg"
                 onerror="this.src='../elements/placeholder/photo1.jpg'"
                 alt="Description">
            <div class="overlay">
                <div class="overlay-title">Festival Name 2025</div>
                <div class="overlay-meta">Event / Location</div>
            </div>
        </div>
        -->

    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">[ close ]</span>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <div class="footer">
        <p>&copy; 2024&ndash;2025 Owyler &mdash; AFest</p>
    </div>

    <script>
        /* ─── Album Filter ─── */
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                galleryItems.forEach(item => {
                    item.style.display = (filter === 'all' || item.dataset.album === filter) ? '' : 'none';
                });
            });
        });

        /* ─── Lightbox ─── */
        function openLightbox(el) {
            const img = el.querySelector('img');
            const caption = el.querySelector('.overlay-title');
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbCap = document.getElementById('lightbox-caption');

            // Load full-res version (swap w_800 to w_1920)
            lbImg.src = img.src.replace('w_800', 'w_1920');
            lbCap.textContent = caption ? caption.textContent : '';
            lb.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>

</body>
</html>
